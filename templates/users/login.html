{% extends 'base.html' %} {% load static %} {% block content %}
<style>
  .glass-card {
    background: rgba(255, 255, 255, 0.75) !important;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(0, 0, 0, 0.08) !important;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.04) !important;
    border-radius: 24px !important;
    transition: all 0.3s ease;
  }
  .glass-card:hover {
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.08) !important;
  }
  
  .dark-mode .glass-card {
    background: rgba(31, 41, 55, 0.75) !important;
    border: 1px solid rgba(255, 255, 255, 0.08) !important;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25) !important;
  }
  .dark-mode .glass-card:hover {
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.35) !important;
  }
  
  .login-input {
    border-radius: 14px !important;
    border: 2px solid #E2E8F0 !important;
    padding: 13px 18px !important;
    font-size: 0.95rem !important;
    transition: all 0.2s ease !important;
    background: #FFFFFF !important;
  }
  .login-input:focus {
    border-color: #10B981 !important;
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
  }
  
  .dark-mode .login-input {
    background: #374151 !important;
    border-color: rgba(255, 255, 255, 0.1) !important;
    color: #F9FAFB !important;
  }
  .dark-mode .login-input:focus {
    border-color: #10B981 !important;
    box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.25) !important;
  }

  @keyframes slideUpFade {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

<div class="row justify-content-center mt-4" style="position: relative; overflow: visible;">
  <!-- Glow Circles -->
  <div style="position: absolute; top: -30px; left: 20%; width: 250px; height: 250px; background: radial-gradient(circle, rgba(16, 185, 129, 0.22) 0%, rgba(16, 185, 129, 0) 70%); filter: blur(40px); pointer-events: none; z-index: 0;"></div>
  <div style="position: absolute; bottom: -30px; right: 20%; width: 250px; height: 250px; background: radial-gradient(circle, rgba(124, 58, 237, 0.18) 0%, rgba(124, 58, 237, 0) 70%); filter: blur(40px); pointer-events: none; z-index: 0;"></div>

  <div class="col-md-5" style="position: relative; z-index: 1; animation: slideUpFade 0.6s ease-out forwards;">
    <div class="card p-4 p-md-5 glass-card">
      <div class="text-center mb-4">
        <div class="mb-4">
          <div class="d-flex flex-column align-items-center mb-4 mt-2">
            <img src="{% static 'logo.png' %}?v=3" alt="BudgetBites Logo" style="height: 120px; width: auto; object-fit: contain; border-radius: 50%; box-shadow: 0 8px 24px rgba(6, 78, 59, 0.1);">
          </div>
        </div>
        <span class="badge-pill">Welcome Back!</span>
        <h3 class="fw-bold mt-2">
          Login to BudgetBites
        </h3>
        <p class="text-muted" style="font-size: 0.9rem">
          Your delicious recipes are waiting!
        </p>
      </div>
      <form method="POST" id="loginForm">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label" style="font-weight: 600">
            <i class="fas fa-user me-1" style="color: #059669"></i> Username
          </label>
          <input
            type="text"
            name="username"
            class="form-control form-control-lg login-input"
            placeholder="Enter your username"
            required
          />
        </div>
        <div class="mb-4">
          <label class="form-label" style="font-weight: 600">
            <i class="fas fa-lock me-1" style="color: #059669"></i> Password
          </label>
          <div style="position: relative;">
            <input
              type="password"
              name="password"
              class="form-control form-control-lg login-input"
              placeholder="Enter your password"
              style="padding-right: 50px !important;"
              required
            />
            <button type="button" id="togglePassword" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; outline: none; padding: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10;">
              <i class="far fa-eye text-muted" id="togglePasswordIcon" style="font-size: 1.15rem; transition: color 0.2s;"></i>
            </button>
          </div>
        </div>
        <button type="submit" id="submitBtn" class="btn btn-purple w-100 btn-lg">
          <i class="fas fa-sign-in-alt me-2"></i> Login to My Account
        </button>

        <!-- Forgot Password Link -->
        <div class="text-center mt-3">
          <a href="{% url 'password_reset' %}" style="color: #6B7280; font-size: 0.88rem; text-decoration: none;">
            <i class="fas fa-key me-1"></i> Forgot your password?
          </a>
        </div>
      </form>
      <div class="text-center mt-4">
        <p class="text-muted mb-0" style="font-size: 0.9rem">
          Don't have an account?
          <a
            href="{% url 'register' %}"
            style="color: #059669; font-weight: 700; text-decoration: none"
            >Register Free 🚀</a
          >
        </p>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Password visibility toggle logic
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.querySelector('input[name="password"]');
    const passwordIcon = document.getElementById('togglePasswordIcon');

    if (togglePassword && passwordInput && passwordIcon) {
      togglePassword.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        
        if (type === 'text') {
          passwordIcon.classList.remove('fa-eye');
          passwordIcon.classList.add('fa-eye-slash');
          passwordIcon.style.color = '#059669';
        } else {
          passwordIcon.classList.remove('fa-eye-slash');
          passwordIcon.classList.add('fa-eye');
          passwordIcon.style.color = '';
        }
      });
    }

    // Form submission loader spinner logic
    const loginForm = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');

    if (loginForm && submitBtn) {
      loginForm.addEventListener('submit', function() {
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Signing in...';
        setTimeout(() => { submitBtn.disabled = true; }, 1);
      });
    }
  });
</script>
{% endblock %}
