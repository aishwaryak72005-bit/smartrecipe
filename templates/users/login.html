{% extends 'base.html' %} {% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card p-4 p-md-5">
      <div class="text-center mb-4">
        <div
          style="
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #F0FDF4, #DCFCE7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 16px;
          "
        >
          👨‍🍳
        </div>
        <span class="badge-pill">Welcome Back!</span>
        <h3 class="fw-bold mt-2" style="color: #064E3B">
          Login to SmartRecipe
        </h3>
        <p class="text-muted" style="font-size: 0.9rem">
          Your delicious recipes are waiting!
        </p>
      </div>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label" style="font-weight: 600; color: #064E3B">
            <i class="fas fa-user me-1" style="color: #10B981"></i> Username
          </label>
          <input
            type="text"
            name="username"
            class="form-control form-control-lg"
            placeholder="Enter your username"
            style="
              border-radius: 14px;
              border: 2px solid #F0FDF4;
              padding: 13px 18px;
              font-size: 0.95rem;
            "
          />
        </div>
        <div class="mb-4">
          <label class="form-label" style="font-weight: 600; color: #064E3B">
            <i class="fas fa-lock me-1" style="color: #10B981"></i> Password
          </label>
          <input
            type="password"
            name="password"
            class="form-control form-control-lg"
            placeholder="Enter your password"
            style="
              border-radius: 14px;
              border: 2px solid #F0FDF4;
              padding: 13px 18px;
              font-size: 0.95rem;
            "
          />
        </div>
        <button type="submit" class="btn btn-purple w-100 btn-lg">
          <i class="fas fa-sign-in-alt me-2"></i> Login to My Account
        </button>
      </form>
      <div class="text-center mt-4">
        <p class="text-muted mb-0" style="font-size: 0.9rem">
          Don't have an account?
          <a
            href="{% url 'register' %}"
            style="color: #10B981; font-weight: 700; text-decoration: none"
            >Register Free 🚀</a
          >
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
