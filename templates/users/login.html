{% extends 'base.html' %} {% load static %} {% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card p-4 p-md-5">
      <div class="text-center mb-4">
        <div class="mb-4">
          <div class="d-flex flex-column align-items-center mb-4 mt-2">
            <img src="{% static 'logo.png' %}?v=2" alt="BudgetBites Logo" style="height: 100px; width: 100px; object-fit: cover; border-radius: 50%; background: #FFFFFF; border: 3px solid #E2E8F0; box-shadow: 0 8px 24px rgba(6, 78, 59, 0.1);">
            <h2 class="mt-3 mb-1" style="font-weight: 900; font-size: 2.2rem; color: #064E3B; letter-spacing: -0.5px;">Budget<span style="color: #059669;">Bites</span></h2>
            <p style="font-size: 0.8rem; font-weight: 700; color: #6B7280; text-transform: uppercase; letter-spacing: 1px;">Cook Smart. Spend Less. Eat Better.</p>
          </div>
        </div>
        <span class="badge-pill">Welcome Back!</span>
        <h3 class="fw-bold mt-2">
          Login to BudgetBites
        </h3>
        <p class="text-muted" style="font-size: 0.9rem">
          Your delicious recipes are waiting!
        </p>
      </div>
      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label" style="font-weight: 600">
            <i class="fas fa-user me-1" style="color: #059669"></i> Username
          </label>
          <input
            type="text"
            name="username"
            class="form-control form-control-lg"
            placeholder="Enter your username"
            style="
              border-radius: 14px;
              border: 2px solid #F8FAFC;
              padding: 13px 18px;
              font-size: 0.95rem;
            "
          />
        </div>
        <div class="mb-4">
          <label class="form-label" style="font-weight: 600">
            <i class="fas fa-lock me-1" style="color: #059669"></i> Password
          </label>
          <input
            type="password"
            name="password"
            class="form-control form-control-lg"
            placeholder="Enter your password"
            style="
              border-radius: 14px;
              border: 2px solid #F8FAFC;
              padding: 13px 18px;
              font-size: 0.95rem;
            "
          />
        </div>
        <button type="submit" class="btn btn-purple w-100 btn-lg">
          <i class="fas fa-sign-in-alt me-2"></i> Login to My Account
        </button>
      </form>
      <div class="text-center mt-4">
        <p class="text-muted mb-0" style="font-size: 0.9rem">
          Don't have an account?
          <a
            href="{% url 'register' %}"
            style="color: #059669; font-weight: 700; text-decoration: none"
            >Register Free 🚀</a
          >
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
